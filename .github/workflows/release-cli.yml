name: Manual Release fabric-cli

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build with Go
        run: |
          mkdir -p target
          go build -ldflags="-w -s" -o target/fabric-cli ./cmd/fabric-cli

      - name: Get project version
        id: get_version
        run: |
          VERSION='1.0.2'
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Find Binary file
        id: find_binary
        run: |
          BIN_PATH="target/fabric-cli"
          BIN_NAME="fabric-cli"
          echo "bin_path=$BIN_PATH" >> $GITHUB_OUTPUT
          echo "bin_name=$BIN_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: fabric-cli v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_binary.outputs.bin_path }}
          asset_name: ${{ steps.find_binary.outputs.bin_name }}
          asset_content_type: application/octet-stream
